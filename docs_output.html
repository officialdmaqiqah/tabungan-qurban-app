  <body>
    <!-- Content -->

    <div class="authentication-wrapper authentication-cover">
      <!-- Logo -->
      <a href="https://xsender.id" class="app-brand auth-cover-brand">
        <span class="app-brand-logo demo">
          <span class="text-primary">
            <img
  src="/branding/logo-header.png?v=1773311418"
  alt="XSender"
  style="display:block; height:40px; width:auto; max-width:100%;"
/>

        </span>
      </a>
      <!-- /Logo -->
      <div class="authentication-inner row m-0">
                <!-- /Left Text -->
        <div class="d-none d-xl-flex col-xl-8 p-0">
          <div class="auth-cover-bg d-flex justify-content-center align-items-center">
            <img
              src="/themes/vuexy/img/illustrations/boy-with-laptop-light.png?v=1773048020"
              alt="auth-login-cover"
              class="my-5 auth-illustration"
              
               />
          </div>
        </div>
        <!-- /Left Text -->

        <!-- Login -->
        <div class="d-flex col-12 col-xl-4 align-items-center authentication-bg p-sm-12 p-6">
          <div class="w-px-400 mx-auto mt-12 pt-5 position-relative">
            <h4 class="mb-1">Masuk</h4>
            <p class="mb-6">Hai, selamat datang di XSender.</p>

                        <div class="d-flex gap-2 mb-6">
              <button type="button" class="btn btn-sm btn-primary" id="tabEmailLogin">Login via Email</button>
              <button type="button" class="btn btn-sm btn-outline-secondary" id="tabWaLogin">Login via WhatsApp</button>
            </div>

            <form id="emailLoginForm" class="mb-6 " action="https://xsender.id/id/login" method="POST">
              <input type="hidden" name="_token" value="v654UkDTM2VHpv5l3tfaXLbXobq4WgqFbHEsSIbh" autocomplete="off">              <input type="hidden" name="login_method" value="email">
              <div class="mb-6 form-control-validation">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control "
                  id="email"
                  name="email"
                  placeholder="email@example.com"
                  value=""
                  autofocus />
                <p class="text-danger"></p>
              </div>
              <div class="mb-6 form-password-toggle form-control-validation">
                <label class="form-label" for="email_password">Inputkan Kata Sandi</label>
                <div class="input-group input-group-merge">
                  <input type="password" id="email_password" class="form-control" name="password" placeholder="Inputkan Kata Sandi" />
                  <span class="input-group-text cursor-pointer"><i class="icon-base ti tabler-eye-off"></i></span>
                </div>
              </div>
              <div class="my-8">
                <div class="d-flex justify-content-between">
                  <div class="form-check mb-0 ms-2">
                    <input class="form-check-input" type="checkbox" id="remember-me" name="remember" />
                    <label class="form-check-label" for="remember-me">Ingat Saya</label>
                  </div>
                  <a href="https://xsender.id/id/password/reset">
                    <p class="mb-0">Atur Ulang Kata Sandi</p>
                  </a>
                </div>
              </div>
              <button class="btn btn-primary d-grid w-100">Masuk</button>
            </form>

            <form id="waLoginForm" class="mb-6 d-none" action="https://xsender.id/id/login" method="POST">
              <input type="hidden" name="_token" value="v654UkDTM2VHpv5l3tfaXLbXobq4WgqFbHEsSIbh" autocomplete="off">              <input type="hidden" name="login_method" value="whatsapp">
              <div class="mb-6 form-control-validation">
                <label for="whatsapp_number" class="form-label">Nomor WhatsApp</label>
                <input
                  type="text"
                  class="form-control "
                  id="whatsapp_number"
                  name="whatsapp_number"
                  inputmode="numeric"
                  maxlength="20"
                  placeholder="628xxxxxxxxxx"
                  value="" />
                <p class="text-danger"></p>
              </div>
              <div class="mb-6 form-control-validation">
                <label for="otp_code" class="form-label">Kode OTP WhatsApp</label>
                <div class="d-flex gap-2">
                  <button class="btn btn-outline-secondary" type="submit" name="otp_action" value="send">Minta OTP</button>
                  <input
                    type="text"
                    class="form-control "
                    id="otp_code"
                    name="otp_code"
                    inputmode="numeric"
                    maxlength="6"
                    placeholder="Masukkan 6 digit OTP"
                    value="" />
                </div>
                <p class="text-danger"></p>
              </div>
              <button class="btn btn-primary d-grid w-100" type="submit">Verifikasi &amp; Masuk</button>
            </form>

            <script>
              (function () {
                const tabEmail = document.getElementById('tabEmailLogin');
                const tabWa = document.getElementById('tabWaLogin');
                const formEmail = document.getElementById('emailLoginForm');
                const formWa = document.getElementById('waLoginForm');
                function setMode(mode) {
                  const emailActive = mode === 'email';
                  formEmail.classList.toggle('d-none', !emailActive);
                  formWa.classList.toggle('d-none', emailActive);
                  tabEmail.classList.toggle('btn-primary', emailActive);
                  tabEmail.classList.toggle('btn-outline-secondary', !emailActive);
                  tabWa.classList.toggle('btn-primary', !emailActive);
                  tabWa.classList.toggle('btn-outline-secondary', emailActive);
                }
                tabEmail.addEventListener('click', function () { setMode('email'); });
                tabWa.addEventListener('click', function () { setMode('whatsapp'); });
              })();
            </script>
          </div>
        </div>
        <!-- /Login -->
      </div>
